<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>امتحان الطلاب</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f0f0;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 70%;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>امتحان الكيمياء 🧪</h1>
    <p>السؤال الأول: ما هو العامل الحفاز؟</p>

    <button onclick="alert('العامل الحفاز مادة تزيد سرعة التفاعل دون أن تُستهلك')">
        اضغط للإجابة
    </button>
</div>

</body>
</html>
